<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>VTP Tool All-in-One</title>
    <style>
        :root {
            --vtp-red: #ee0033;
            --vtp-red-hover: #d4002d;
            --bg-main: #f0f2f5;
            --bg-card: #ffffff;
            --text-main: #1c1e21;
        }
        body { width: 340px; margin: 0; font-family: Arial, sans-serif; background-color: var(--bg-main); }
        .app-header { background: linear-gradient(135deg, var(--vtp-red) 0%, #ff3355 100%); padding: 15px; color: white; text-align: center; font-weight: bold; font-size: 16px; }
        
        /* Tab Styles */
        .tabs { display: flex; background: var(--bg-card); border-bottom: 1px solid #ccc; }
        .tab-btn { flex: 1; padding: 12px 0; text-align: center; cursor: pointer; font-weight: bold; color: #555; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--vtp-red); border-bottom: 3px solid var(--vtp-red); }
        
        .tab-content { display: none; padding: 15px; background: var(--bg-card); }
        .tab-content.active { display: block; }

        /* Shared UI */
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 8px; box-sizing: border-box; border-radius: 6px; border: 1px solid #ccc;}
        input[type="number"] { width: 60px; padding: 5px; border-radius: 4px; border: 1px solid #ccc;}
        button { width: 100%; padding: 12px; margin-top: 5px; cursor: pointer; background: var(--vtp-red); color: white; border: none; border-radius: 6px; font-weight: bold; }
        button:hover { background: var(--vtp-red-hover); }
        button.stop { background: #555; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .status { margin-top: 10px; font-size: 13px; color: #333; text-align: center; font-weight: bold;}
        .status-box { padding: 10px; border-radius: 6px; text-align: center; margin-bottom: 10px; font-size: 13px; font-weight: bold; }
        .ready { background: #e6f4ea; color: #31a24c; }
        .not-ready { background: #fdf3f4; color: var(--vtp-red); }
    </style>
</head>
<body>
    <div class="app-header">VTP TOOL ALL-IN-ONE</div>
    
    <div class="tabs">
        <div class="tab-btn active" data-target="tab-chinhgio">🕒 Sửa Giờ</div>
        <div class="tab-btn" data-target="tab-gapton">📦 Kiểm Tồn</div>
    </div>

    <div id="tab-chinhgio" class="tab-content active">
        <div style="margin-bottom: 5px; font-size: 13px; font-weight: bold;">Danh sách mã vận đơn:</div>
        <textarea id="billList" placeholder="Dán các mã vận đơn vào đây..."></textarea>
        
        <label style="font-size: 13px;">Độ trễ mạng (giây): 
            <input type="number" id="delay" value="5" min="1">
        </label>
        
        <button id="startChinhGioBtn">▶ BẮT ĐẦU CHẠY</button>
        <button id="stopChinhGioBtn" class="stop">⏹ DỪNG LẠI</button>
        
        <div class="status" id="statusChinhGio">Trạng thái: Sẵn sàng</div>
    </div>

    <div id="tab-gapton" class="tab-content">
        <div id="statusBoxGapTon" class="status-box not-ready">Đang kiểm tra trang web...</div>
        <button id="startGapTonBtn" disabled>🚀 CHẠY KIỂM TỒN</button>
        
        <div style="margin-top: 15px; font-size: 12px; color: #666; background: #f8f9fa; padding: 10px; border-radius: 6px;">
            <b>Lưu ý:</b><br>
            - Phải mở trang ViettelPost mới có thể chạy.<br>
            - Tuyệt đối không thao tác chuột/phím khi tool chạy.
        </div>
    </div>

    <script src="notification.js"></script>
    <script src="popup.js"></script>
</body>
</html>
